      tool_call_schema: unknown
      file_edit_model: text-only output
      rules_file: none
      memory_layer: session-only
      renderer: text
      notes: >
        Maximally conservative fallback. Body gives zero surface-detection
        signal — no rules-file references, no tool-call schema mentions.
        Single profile supplied; do not assume IDE/CLI-surface support
        the way the Legal/R&D siblings declare it.
  applies_to:
